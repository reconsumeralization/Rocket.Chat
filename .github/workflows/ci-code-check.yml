name: Code Checks

on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string
      deno-version:
        required: true
        type: string

env:
  TOOL_NODE_FLAGS: ${{ vars.TOOL_NODE_FLAGS }}

jobs:
  code-check:
    runs-on: ubuntu-24.04-arm

    name: ${{ matrix.check == 'ts' && 'TypeScript' || 'Code Lint' }}

    strategy:
      fail-fast: false
      matrix:
        check: ['ts', 'lint']

    steps:
      - name: Set Swap Space
        uses: pierotofy/set-swap-space@49819abfb41bd9b44fb781159c033dba90353a7c # v1.0.0
        with:
          swap-size-gb: 4

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup NodeJS
        uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
          deno-version: ${{ inputs.deno-version }}
          cache-modules: true
          install: true
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: rharkor/caching-for-turbo@2f61e9bebb2f51f2ed041ce70377b0f81b3b1e0d # v2.4.1

      - uses: ./.github/actions/restore-packages

      - name: Restore TypeScript incremental cache
        id: restore-typecheck
        if: matrix.check == 'ts'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ./apps/meteor/tsconfig.typecheck.tsbuildinfo
          key: typecheck-cache-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            typecheck-cache-${{ runner.os }}-

      - name: Cache observability (typecheck)
        if: matrix.check == 'ts'
        run: |
          {
            echo "### TypeScript incremental cache"
            echo "- **exact hit**: \`${{ steps.restore-typecheck.outputs.cache-hit }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install Meteor
        shell: bash
        run: |
          # Restore bin from cache
          set +e
          METEOR_SYMLINK_TARGET=$(readlink ~/.meteor/meteor)
          METEOR_TOOL_DIRECTORY=$(dirname "$METEOR_SYMLINK_TARGET")
          set -e
          LAUNCHER=$HOME/.meteor/$METEOR_TOOL_DIRECTORY/scripts/admin/launch-meteor
          if [ -e "$LAUNCHER" ]
          then
            echo "Cached Meteor bin found, restoring it"
            sudo cp "$LAUNCHER" "/usr/local/bin/meteor"
          else
            echo "No cached Meteor bin found."
          fi

          # only install meteor if bin isn't found
          command -v meteor >/dev/null 2>&1 || curl https://install.meteor.com | sed s/--progress-bar/-sL/g | /bin/sh

      - name: TS TypeCheck
        if: matrix.check == 'ts'
        run: yarn turbo run typecheck --concurrency=5

      - name: Save TypeScript incremental cache
        if: matrix.check == 'ts' && github.ref == 'refs/heads/develop' && github.event_name == 'push'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ./apps/meteor/tsconfig.typecheck.tsbuildinfo
          key: typecheck-cache-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      - name: Restore ESLint cache
        id: restore-eslint
        if: matrix.check == 'lint'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ./apps/meteor/.eslintcache
          key: eslintcache-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            eslintcache-${{ runner.os }}-

      - name: Cache observability (eslint)
        if: matrix.check == 'lint'
        run: |
          {
            echo "### ESLint cache"
            echo "- **exact hit**: \`${{ steps.restore-eslint.outputs.cache-hit }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Lint
        if: matrix.check == 'lint'
        run: yarn lint

      - name: Save ESLint cache
        if: matrix.check == 'lint' && github.ref == 'refs/heads/develop' && github.event_name == 'push'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ./apps/meteor/.eslintcache
          key: eslintcache-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
